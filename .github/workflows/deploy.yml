name: Deploy to InfinityFree

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=()
          [ -z "${{ secrets.FTP_USERNAME }}"  ] && missing+=("FTP_USERNAME")
          [ -z "${{ secrets.FTP_PASSWORD }}"  ] && missing+=("FTP_PASSWORD")
          [ -z "${{ secrets.DB_HOST }}"       ] && missing+=("DB_HOST")
          [ -z "${{ secrets.DB_NAME }}"       ] && missing+=("DB_NAME")
          [ -z "${{ secrets.DB_USER }}"       ] && missing+=("DB_USER")
          [ -z "${{ secrets.DB_PASS }}"       ] && missing+=("DB_PASS")
          [ -z "${{ secrets.TMDB_API_KEY }}"  ] && missing+=("TMDB_API_KEY")
          [ -z "${{ secrets.JWT_SECRET }}"    ] && missing+=("JWT_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "All secrets present"

      - name: Write config.php from secrets
        run: |
          cat > includes/config.php << 'PHPEOF'
          <?php
          /*
           * StreamSuite — Free, open-source streaming website
           * Copyright (C) 2026  StreamSuite Contributors
           *
           * This program is free software: you can redistribute it and/or modify
           * it under the terms of the GNU General Public License as published by
           * the Free Software Foundation, either version 3 of the License, or
           * (at your option) any later version.
           *
           * This program is distributed in the hope that it will be useful,
           * but WITHOUT ANY WARRANTY; without even the implied warranty of
           * MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE. See the
           * GNU General Public License for more details.
           *
           * You should have received a copy of the GNU General Public License
           * along with this program. If not, see <https://www.gnu.org/licenses/>.
           */
          PHPEOF
          printf "define('DB_HOST',    '%s');\n" "${{ secrets.DB_HOST }}"        >> includes/config.php
          printf "define('DB_NAME',    '%s');\n" "${{ secrets.DB_NAME }}"        >> includes/config.php
          printf "define('DB_USER',    '%s');\n" "${{ secrets.DB_USER }}"        >> includes/config.php
          printf "define('DB_PASS',    '%s');\n" "${{ secrets.DB_PASS }}"        >> includes/config.php
          printf "define('TMDB_API_KEY', '%s');\n" "${{ secrets.TMDB_API_KEY }}" >> includes/config.php
          printf "define('TMDB_LANG',  'en-US');\n"                              >> includes/config.php
          printf "define('JWT_SECRET', '%s');\n" "${{ secrets.JWT_SECRET }}"    >> includes/config.php
          printf "define('APP_URL',    'https://streamsuite.ct.ws');\n"          >> includes/config.php
          printf "define('APP_ENV',    'production');\n"                         >> includes/config.php
          printf "define('GUEST_TOKEN_HEADER', 'HTTP_X_GUEST_TOKEN');\n"        >> includes/config.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USERNAME }}
          password:    ${{ secrets.FTP_PASSWORD }}
          local-dir:   ./
          server-dir:  /streamsuite.ct.ws/htdocs/
          protocol:    ftp
          port:        21
          timeout:     60000
          log-level:   minimal
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            .gitignore
            .gitattributes
            .eslintrc.json
            .stylelintrc.json
            eslint.config.mjs
            composer.json
            composer.lock
            README.md
            CONTRIBUTING.md
            SECURITY.md
            CHANGELOG.md
            LICENSE
            docs/**
            api/diag.php
